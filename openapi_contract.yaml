openapi: 3.0.3
info:
  title: To-Do Backend API
  version: 1.0.0
  description: |
    Formal OpenAPI-style contract for the FastAPI to-do backend.
    This document reflects the currently implemented routes and payload shapes.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: users
  - name: departments
  - name: tasks
  - name: sub-tasks
  - name: activities
  - name: dashboard
  - name: audit-logs
paths:
  /login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          $ref: '#/components/responses/Error401'

  /register:
    post:
      tags: [auth]
      summary: Register user (admin only)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '403':
          $ref: '#/components/responses/Error403'

  /change-password:
    post:
      tags: [auth]
      summary: Change current user's password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Error401'

  /users:
    get:
      tags: [users]
      summary: List users (admin only)
      operationId: getUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/Error403'

  /users/{user_id}:
    put:
      tags: [users]
      summary: Update user (admin only)
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/Error404'
    delete:
      tags: [users]
      summary: Delete user (admin only)
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'

  /users/remediate-passwords:
    post:
      tags: [users]
      summary: Remediate invalid password hashes (admin only)
      operationId: remediatePasswords
      parameters:
        - in: query
          name: dry_run
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Remediation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordRemediationResponse'

  /departments:
    post:
      tags: [departments]
      summary: Create department (admin only)
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentCreate'
      responses:
        '200':
          description: Department created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
        '409':
          $ref: '#/components/responses/Error409'
    get:
      tags: [departments]
      summary: List departments
      operationId: listDepartments
      responses:
        '200':
          description: Departments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepartmentResponse'

  /users/{user_id}/departments:
    put:
      tags: [departments]
      summary: Assign user departments (admin only)
      operationId: assignUserDepartments
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDepartmentAssignRequest'
      responses:
        '200':
          description: Department assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDepartmentAssignResponse'

  /tasks:
    post:
      tags: [tasks]
      summary: Create task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreateResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'
    get:
      tags: [tasks]
      summary: List tasks (admin only)
      operationId: listTasksAdmin
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAdminListResponse'

  /my-tasks:
    get:
      tags: [tasks]
      summary: List my tasks
      operationId: listMyTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: My tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'

  /tasks/{task_id}:
    get:
      tags: [tasks]
      summary: Get task by id
      operationId: getTaskById
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task with sub-tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskWithSubTasksResponse'
        '404':
          $ref: '#/components/responses/Error404'
    put:
      tags: [tasks]
      summary: Update task or request approval
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated or approval request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
    delete:
      tags: [tasks]
      summary: Delete task (admin only)
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /tasks/{task_id}/complete:
    put:
      tags: [tasks]
      summary: Complete task assigned to current user
      operationId: completeTask
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task marked complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /task-update-requests/my:
    get:
      tags: [tasks]
      summary: List my task update requests
      operationId: listMyTaskUpdateRequests
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Task update requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateRequestListResponse'

  /task-update-requests:
    get:
      tags: [tasks]
      summary: List all task update requests (admin only)
      operationId: listAllTaskUpdateRequests
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskUpdateRequestStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Task update requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateRequestListResponse'

  /task-update-requests/{request_id}/approve:
    put:
      tags: [tasks]
      summary: Approve task update request (admin only)
      operationId: approveTaskUpdateRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequestDecision'
      responses:
        '200':
          description: Approved task update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateRequestResponse'

  /task-update-requests/{request_id}/reject:
    put:
      tags: [tasks]
      summary: Reject task update request (admin only)
      operationId: rejectTaskUpdateRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequestDecision'
      responses:
        '200':
          description: Rejected task update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskUpdateRequestResponse'

  /tasks/{task_id}/progress:
    get:
      tags: [tasks]
      summary: Task progress metrics
      operationId: getTaskProgress
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Progress details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'

  /tasks/{task_id}/timeline:
    get:
      tags: [tasks]
      summary: Task timeline and bars
      operationId: getTaskTimeline
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Timeline details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskTimelineResponse'

  /tasks/{task_id}/subtasks/priorities:
    put:
      tags: [tasks]
      summary: Bulk update sub-task priorities
      operationId: updateSubTaskPriorities
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPriorityBulkUpdateRequest'
      responses:
        '200':
          description: Priorities updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPriorityBulkUpdateResponse'
    post:
      tags: [tasks]
      summary: Bulk update sub-task priorities (alias)
      operationId: updateSubTaskPrioritiesAlias
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPriorityBulkUpdateRequest'
      responses:
        '200':
          description: Priorities updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPriorityBulkUpdateResponse'

  /tasks/{task_id}/revise:
    post:
      tags: [tasks]
      summary: Create revised task version (admin only)
      operationId: reviseTask
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskVersionBumpRequest'
      responses:
        '200':
          description: Revised task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /subtasks:
    post:
      tags: [sub-tasks]
      summary: Create sub-task
      operationId: createSubTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubTaskCreate'
      responses:
        '200':
          description: Sub-task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskResponse'
    get:
      tags: [sub-tasks]
      summary: List sub-tasks
      operationId: listSubTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SubTaskStatus'
        - in: query
          name: task_id
          schema:
            type: integer
      responses:
        '200':
          description: Sub-task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskListResponse'

  /subtasks/{sub_task_id}:
    get:
      tags: [sub-tasks]
      summary: Get sub-task by id
      operationId: getSubTaskById
      parameters:
        - $ref: '#/components/parameters/SubTaskIdPath'
      responses:
        '200':
          description: Sub-task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskResponse'
    put:
      tags: [sub-tasks]
      summary: Update sub-task or create approval request
      operationId: updateSubTask
      parameters:
        - $ref: '#/components/parameters/SubTaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubTaskUpdate'
      responses:
        '200':
          description: Sub-task response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskResponse'
    delete:
      tags: [sub-tasks]
      summary: Delete sub-task
      operationId: deleteSubTask
      parameters:
        - $ref: '#/components/parameters/SubTaskIdPath'
      responses:
        '200':
          description: Sub-task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /subtask-update-requests/my:
    get:
      tags: [sub-tasks]
      summary: List my sub-task update requests
      operationId: listMySubTaskUpdateRequests
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskUpdateRequestListResponse'

  /subtask-update-requests:
    get:
      tags: [sub-tasks]
      summary: List all sub-task update requests (admin only)
      operationId: listAllSubTaskUpdateRequests
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SubTaskUpdateRequestStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Request list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskUpdateRequestListResponse'

  /subtask-update-requests/{request_id}/approve:
    put:
      tags: [sub-tasks]
      summary: Approve sub-task update request (admin only)
      operationId: approveSubTaskUpdateRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubTaskUpdateRequestDecision'
      responses:
        '200':
          description: Approved request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskUpdateRequestResponse'

  /subtask-update-requests/{request_id}/reject:
    put:
      tags: [sub-tasks]
      summary: Reject sub-task update request (admin only)
      operationId: rejectSubTaskUpdateRequest
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubTaskUpdateRequestDecision'
      responses:
        '200':
          description: Rejected request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubTaskUpdateRequestResponse'

  /activities:
    post:
      tags: [activities]
      summary: Create activity (admin only)
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreate'
      responses:
        '200':
          description: Activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'

  /activities/{activity_id}:
    put:
      tags: [activities]
      summary: Update activity (admin only)
      operationId: updateActivity
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityUpdate'
      responses:
        '200':
          description: Activity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
    delete:
      tags: [activities]
      summary: Delete activity (admin only)
      operationId: deleteActivity
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Activity deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /tasks/{task_id}/activities:
    get:
      tags: [activities]
      summary: List task activities
      operationId: listTaskActivities
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ActivityStatus'
        - in: query
          name: sub_task_id
          schema:
            type: integer
      responses:
        '200':
          description: Activity list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'

  /dashboard:
    get:
      tags: [dashboard]
      summary: Get dashboard summary
      operationId: getDashboard
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

  /audit-logs:
    get:
      tags: [audit-logs]
      summary: List audit logs
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/Page'
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: entity_type
          schema:
            type: string
        - in: query
          name: entity_id
          schema:
            type: integer
        - in: query
          name: user_id
          schema:
            type: integer
        - $ref: '#/components/parameters/Search'
        - in: query
          name: start_date
          schema:
            type: string
            format: date-time
        - in: query
          name: end_date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    Search:
      in: query
      name: search
      required: false
      schema:
        type: string
    UserIdPath:
      in: path
      name: user_id
      required: true
      schema:
        type: integer
    TaskIdPath:
      in: path
      name: task_id
      required: true
      schema:
        type: integer
    SubTaskIdPath:
      in: path
      name: sub_task_id
      required: true
      schema:
        type: integer
    ActivityIdPath:
      in: path
      name: activity_id
      required: true
      schema:
        type: integer
    RequestIdPath:
      in: path
      name: request_id
      required: true
      schema:
        type: integer

  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [message, code, dev_message, request_id, path]
      properties:
        message:
          type: string
        code:
          type: string
        dev_message:
          type: string
        request_id:
          type: string
        path:
          type: string
        details:
          type: array
          items: {}

    TaskStatus:
      type: string
      enum: [complete, not complete, in progress, blocked]

    SubTaskStatus:
      type: string
      enum: [complete, not complete]

    SubTaskUpdateRequestStatus:
      type: string
      enum: [pending, approved, rejected]

    ActivityStatus:
      type: string
      enum: [complete, not complete]

    UserReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    DepartmentReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    UserCreate:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          default: user

    UserLogin:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    PasswordChangeRequest:
      type: object
      required: [new_password]
      properties:
        current_password:
          type: string
          nullable: true
        new_password:
          type: string

    Token:
      type: object
      required: [access_token, token_type, username, role, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        username:
          type: string
        role:
          type: string
        user:
          $ref: '#/components/schemas/UserReference'

    UserResponse:
      type: object
      required: [id, name, email, role, departments]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        departments:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentReference'

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        role:
          type: string

    PasswordRemediationUser:
      type: object
      required: [user_id, username, temporary_password]
      properties:
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        temporary_password:
          type: string

